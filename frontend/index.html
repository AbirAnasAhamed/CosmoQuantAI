<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-g" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CosmoQuantAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      html {
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      .dark body {
        background-image: radial-gradient(circle at 1px 1px, rgba(203, 213, 225, 0.1) 1px, transparent 0);
        background-size: 2rem 2rem;
      }
      
      .token-comment { color: #6a9955; }
      .token-string { color: #ce9178; }
      .token-keyword { color: #569cd6; font-weight: 500; }
      .token-number { color: #b5cea8; }
      .token-function { color: #dcdcaa; }
      
      .slider-thumb::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        background: #6366F1; /* brand-primary */
        cursor: pointer;
        border-radius: 9999px;
        margin-top: -6px; /* center thumb on track */
      }

      .slider-thumb::-moz-range-thumb {
        width: 16px;
        height: 16px;
        background: #6366F1; /* brand-primary */
        cursor: pointer;
        border-radius: 9999px;
      }
      
      .range-slider-container {
        position: relative;
        height: 20px;
        display: flex;
        align-items: center;
      }
      .thumb, .thumb::-webkit-slider-thumb {
        -webkit-appearance: none;
        -webkit-tap-highlight-color: transparent;
      }
      .thumb {
        pointer-events: none;
        position: absolute;
        height: 0;
        width: 100%;
        outline: none;
        margin: 0;
      }
      .thumb--left { z-index: 3; }
      .thumb--right { z-index: 4; }
      .thumb::-webkit-slider-thumb {
        background-color: #6366F1;
        border: 2px solid white;
        border-radius: 50%;
        box-shadow: 0 0 1px 1px #ced4da;
        cursor: pointer;
        height: 16px;
        width: 16px;
        margin-top: 2px;
        pointer-events: all;
        position: relative;
      }
       .dark .thumb::-webkit-slider-thumb {
        box-shadow: 0 0 1px 1px #1e293b;
       }
      .range-slider-track, .range-slider-range {
        position: absolute;
        border-radius: 3px;
        height: 5px;
      }
      .range-slider-track {
        background-color: #E2E8F0;
        width: 100%;
        z-index: 1;
      }
      .dark .range-slider-track {
        background-color: #334155;
      }
      .range-slider-range {
        background-color: #6366F1;
        z-index: 2;
      }

      /* Hide native date picker icon for a custom UI */
      input[type="date"]::-webkit-calendar-picker-indicator {
        display: none;
        -webkit-appearance: none;
      }
      
      /* For scroll animations */
      .fade-in-up {
          opacity: 0;
          transform: translateY(30px);
          transition: opacity 0.6s ease-out, transform 0.6s ease-out;
      }
      .fade-in-up.is-visible {
          opacity: 1;
          transform: translateY(0);
      }
      
      @keyframes fade-in-down {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      .animate-fade-in-down {
        animation: fade-in-down 0.5s ease-out forwards;
      }

      @keyframes fade-in-right {
        from { opacity: 0; transform: translateX(20px); }
        to { opacity: 1; transform: translateX(0); }
      }

      .animate-fade-in-right {
        animation: fade-in-right 0.3s ease-out forwards;
      }
      
      /* For market ticker animation */
      @keyframes marquee-slow {
        0% { transform: translateX(0%); }
        100% { transform: translateX(-50%); }
      }

      .animate-marquee-slow {
        animation: marquee-slow 25s linear infinite;
        display: inline-block;
        will-change: transform;
      }

      /* For sign up zoom animation */
      @keyframes zoom-in-content {
          0% { transform: scale(0.8); opacity: 0; }
          100% { transform: scale(1); opacity: 1; }
      }
      .animate-zoom-in-content {
          animation: zoom-in-content 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      }
      @keyframes expanding-circle {
          0% { transform: scale(0); opacity: 0.5; }
          100% { transform: scale(2); opacity: 0; }
      }
      .expanding-circle {
          position: absolute;
          border-radius: 50%;
          border: 2px solid #6366F1;
          top: 50%;
          left: 50%;
          width: 100px;
          height: 100px;
          transform: translate(-50%, -50%);
      }

      /* For login transition animation */
      @keyframes pulse-logo {
          0%, 100% { transform: scale(1); }
          50% { transform: scale(1.05); }
      }
      .animate-pulse-logo {
          animation: pulse-logo 1.5s infinite cubic-bezier(0.4, 0, 0.6, 1);
      }
      @keyframes draw-line {
          from { stroke-dashoffset: 1000; }
          to { stroke-dashoffset: 0; }
      }
      .animate-draw-line-1, .animate-draw-line-2 {
          stroke-dasharray: 1000;
          animation: draw-line 1s ease-out forwards;
      }
      .animate-draw-line-2 { animation-delay: 0.2s; }

      @keyframes text-fade-up {
          from { opacity: 0; transform: translateY(20px); }
          to { opacity: 1; transform: translateY(0); }
      }
      .animate-text-fade-up {
          animation: text-fade-up 0.8s ease-out forwards;
      }

      /* For modal fade-in */
      @keyframes modal-fade-in {
          from { opacity: 0; transform: scale(0.95); }
          to { opacity: 1; transform: scale(1); }
      }
      .animate-modal-fade-in {
          animation: modal-fade-in 0.3s ease-out forwards;
      }

      /* For BotLab modal animation */
      @keyframes backdrop-fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-backdrop-fade-in {
        animation: backdrop-fade-in 0.3s ease-out forwards;
      }
      @keyframes modal-content-slide-down {
        from { transform: translateY(-30px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .animate-modal-content-slide-down {
        animation: modal-content-slide-down 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      }

      /* For Settings panel animation */
      @keyframes fade-in-slide-up {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-slide-up {
        animation: fade-in-slide-up 0.6s ease-out forwards;
      }

      /* For Dashboard animations */
      @keyframes count-up {
        from { transform: translateY(15px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .animate-count-up {
        animation: count-up 0.8s ease-out forwards;
      }

      @keyframes staggered-fade-in {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .staggered-fade-in {
        animation: staggered-fade-in 0.6s ease-out both;
      }

      @keyframes pie-explode {
        from { transform: scale(1); }
        to { transform: scale(1.1); }
      }
      .pie-explode {
        animation: pie-explode 0.3s ease-out forwards;
      }
      
      /* New animations for Market page */
      @keyframes price-flash-up {
        from { color: #10B981; text-shadow: 0 0 8px #10B981; transform: scale(1.05); }
        to { color: inherit; text-shadow: none; transform: scale(1); }
      }
      .animate-price-flash-up {
        animation: price-flash-up 0.5s ease-out;
      }
      @keyframes price-flash-down {
        from { color: #F43F5E; text-shadow: 0 0 8px #F43F5E; transform: scale(1.05); }
        to { color: inherit; text-shadow: none; transform: scale(1); }
      }
      .animate-price-flash-down {
        animation: price-flash-down 0.5s ease-out;
      }
      @keyframes row-flash {
        50% { background-color: rgba(99, 102, 241, 0.1); }
      }
      .animate-row-flash {
        animation: row-flash 0.7s ease-out;
      }

      /* For Task Manager checkbox animation */
      .task-checkbox {
        flex-shrink: 0;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        cursor: pointer;
        position: relative;
        background: none;
        border: none;
        padding: 0;
      }
      .checkmark-circle {
        width: 100%;
        height: 100%;
      }
      .checkmark-circle .circle-bg {
        stroke: #E2E8F0; /* slate-200 */
        stroke-width: 2;
        fill: none;
      }
      .dark .checkmark-circle .circle-bg {
        stroke: #475569; /* slate-600 */
      }
      .checkmark-circle .circle-progress {
        stroke: #6366F1; /* brand-primary */
        stroke-width: 2;
        fill: transparent; /* Start transparent */
        stroke-dasharray: 63;
        stroke-dashoffset: 63;
        transition: stroke-dashoffset 0.3s ease-out;
        transform: rotate(-90deg);
        transform-origin: 50% 50%;
      }
      .checkmark-circle .checkmark-path {
        stroke: white;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        stroke-dasharray: 24;
        stroke-dashoffset: 24;
        transition: stroke-dashoffset 0.3s 0.2s ease-out;
      }
      .task-checkbox .checkmark-burst {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        transform: translate(-50%, -50%) scale(0);
        border: 1px solid #6366F1;
      }
      .task-checkbox.completed .checkmark-circle .circle-progress {
        stroke-dashoffset: 0;
        animation: circle-fill-in 0.4s ease-out forwards;
      }
      .task-checkbox.completed .checkmark-circle .checkmark-path {
        stroke-dashoffset: 0;
      }
      .task-checkbox.completed .checkmark-burst {
        animation: check-burst-out 0.5s ease-out forwards;
      }
      @keyframes circle-fill-in {
        from { fill: transparent; }
        to { fill: #6366F1; }
      }
      @keyframes check-burst-out {
        from { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
        to { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
      }

      /* Strikethrough animation */
      .strikethrough-line {
        position: absolute;
        left: 0;
        top: 50%;
        height: 2px;
        background-color: #64748B; /* slate-500 */
        transform-origin: left;
        transform: scaleX(0);
        width: 100%;
        transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      }
      .dark .strikethrough-line {
        background-color: #94A3B8; /* slate-400 */
      }
      .strikethrough-line.completed {
        transform: scaleX(1);
      }
      
      /* New Task Manager animations */
      @keyframes slide-in-top {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-slide-in-top {
        animation: slide-in-top 0.4s ease-out forwards;
      }
      @keyframes fade-out-shrink {
        from {
          opacity: 1;
          transform: scaleY(1);
          max-height: 100px;
        }
        to {
          opacity: 0;
          transform: scaleY(0);
          max-height: 0;
          padding-top: 0;
          padding-bottom: 0;
          margin-bottom: 0;
        }
      }
      .animate-fade-out-shrink {
        transform-origin: center;
        animation: fade-out-shrink 0.4s ease-out forwards;
        overflow: hidden;
      }

      /* New animations for Liquidation Map */
      @keyframes pulse {
        0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); }
        70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255, 255, 255, 0); }
        100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
      }

      @keyframes flash-line {
        0% { opacity: 0; transform: scaleX(0); }
        50% { opacity: 1; transform: scaleX(1); }
        100% { opacity: 0; transform: scaleX(1); }
      }

      @keyframes flash-bg-green {
        50% { background-color: rgba(16, 185, 129, 0.2); }
      }

      @keyframes flash-bg-red {
        50% { background-color: rgba(244, 63, 94, 0.2); }
      }

      /* New animations for Sentiment Engine */
      @keyframes pulse-green {
        0%, 100% { filter: drop-shadow(0 0 2px rgba(16, 185, 129, 0.6)); }
        50% { filter: drop-shadow(0 0 10px rgba(16, 185, 129, 0.8)); }
      }
      .animate-pulse-green { animation: pulse-green 2.5s ease-in-out infinite; }

      @keyframes pulse-red {
        0%, 100% { filter: drop-shadow(0 0 2px rgba(244, 63, 94, 0.6)); }
        50% { filter: drop-shadow(0 0 10px rgba(244, 63, 94, 0.8)); }
      }
      .animate-pulse-red { animation: pulse-red 2.5s ease-in-out infinite; }
      
      @keyframes pulse-yellow {
        0%, 100% { filter: drop-shadow(0 0 2px rgba(251, 191, 36, 0.6)); }
        50% { filter: drop-shadow(0 0 10px rgba(251, 191, 36, 0.8)); }
      }
      .animate-pulse-yellow { animation: pulse-yellow 2.5s ease-in-out infinite; }

      @keyframes fade-slide-in {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-slide-in {
        animation: fade-slide-in 0.5s ease-out forwards;
      }
      
      @keyframes flash-bg-blue {
        50% { background-color: rgba(99, 102, 241, 0.15); }
      }
      .animate-flash-blue {
        animation: flash-bg-blue 1s ease-out;
      }

      @keyframes title-pop-in {
        0% {
          opacity: 0;
          transform: scale(0.8) translateY(10px);
        }
        60% {
          opacity: 1;
          transform: scale(1.05) translateY(0);
        }
        100% {
          transform: scale(1);
        }
      }

      .animate-title-pop-in {
        animation: title-pop-in 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      }


      /* General UI helpers */
      .body-no-scroll {
        overflow: hidden;
      }
      
    </style>
    <script>
      // On page load or when changing themes, best to add inline in `head` to avoid FOUC
      if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }

      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              'brand-darkest': '#0F172A',       // slate-900
              'brand-dark': '#1E293B',          // slate-800
              'brand-primary': '#6366F1',       // indigo-500
              'brand-primary-hover': '#4F46E5', // indigo-600
              'brand-nav-active': '#312E81',   // indigo-800
              'brand-success': '#10B981',       // emerald-500
              'brand-success-light': '#6EE7B7', // emerald-300
              'brand-danger': '#F43F5E',        // rose-500
              'brand-danger-light': '#FDA4AF',  // rose-300
              'brand-warning': '#FBBF24',       // amber-400
              'brand-light': '#F8FAFC',         // slate-50
              'brand-border-dark': '#334155',   // slate-700
              'brand-border-light': '#E2E8F0',  // slate-200
            }
          }
        }
      }
    </script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js" async></script>

  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-brand-light dark:bg-brand-darkest text-slate-800 dark:text-slate-200 transition-colors duration-300">
    <div id="root"></div>

  </body>
</html>
